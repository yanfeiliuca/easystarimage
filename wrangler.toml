name = "easystarimage"
main = "api/generate.js"
compatibility_date = "2025-05-23"

# 部署后设置 API Key（不写入文件）:
#   wrangler secret put EVOLINK_API_KEY

# KV 临时图片存储（用于把用户上传的照片传给 EvoLink）
# 首次部署前先运行：
#   wrangler kv namespace create TEMP_IMAGES
# 把生成的 id 填入下方 YOUR_KV_NAMESPACE_ID
[[kv_namespaces]]
binding = "TEMP_IMAGES"
id = "c3501259f7014ab7a0d71c01170ef772"

[observability]
enabled = true
head_sampling_rate = 1

